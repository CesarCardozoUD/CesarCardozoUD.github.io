<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Nutri Planner</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='./styles/main.css'>
    <link rel='stylesheet' type='text/css' media='screen' href='./styles/cards.css'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="https://kit.fontawesome.com/b5077ad514.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="container">
        <div class="task-input">
            <h1>Nutria Planner 🦦</h1>
            <button id="openBtn">
                <i class="fa-solid fa-circle-plus" style='color: green; font-size: 50px;'></i>
            </button>
        </div>

        <ul id="taskList"></ul>

        <div class="task-done">
            <h1>DONE</h1>
        </div>
        <ul id="doneList"></ul>
    </div>


    <!-- Modal -->

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <h2>Nueva tarea</h2>
            <span>Titulo: </span><input id="taskTitle" autocomplete="off" placeholder="Título de la tarea">
            <span>Descripción: </span><textarea id="taskDesc" autocomplete="off" placeholder="Descripción" rows="4"></textarea>
            <div class="checkGroup">
                <span>¿Es Urgente?: </span><input id="taskUrgency" type="checkbox">
            </div>
            <div class="checkGroup">
                <span>¿Es Importante?: </span><input id="taskImportant" type="checkbox"> 
            </div>
            <span>Fecha de Entrega: </span><input id="taskEndline" type="date" autocomplete="off" placeholder="dd/mm/aaaa">
    
            <div class="modal-buttons">
                <button id="saveTaskBtn">Guardar</button>
                <button id="closeModalBtn">Cancelar</button>
            </div>
        </div>
    </div>
    
    <script src='./scripts/main.js'></script>
    
</body>
</html>
